<!DOCTYPE html>
<html>
<head>
  <title>We're sorry, but something went wrong (500)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
              950: '#172554'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-brand-950 via-brand-900 to-brand-800 flex items-center justify-center">
  <div class="absolute inset-0 pointer-events-none">
    <div class="h-full w-full opacity-30"
         style="background-image: radial-gradient(circle at 25% 25%, rgba(99,102,241,0.15) 0, transparent 45%),
                                radial-gradient(circle at 75% 10%, rgba(14,165,233,0.12) 0, transparent 35%),
                                radial-gradient(circle at 15% 75%, rgba(249,115,22,0.18) 0, transparent 40%);"></div>
  </div>

  <div class="relative z-10 max-w-md mx-auto px-6 text-center">
    <div class="bg-white/10 border border-white/20 backdrop-blur-2xl rounded-3xl p-8 shadow-[0_25px_70px_rgba(15,23,42,0.35)]">
      <div class="mb-6">
        <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-red-400 to-red-600 flex items-center justify-center mx-auto mb-6 shadow-lg">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-white mb-2">Something went wrong</h1>
        <p class="text-white/70">We're sorry, but something went wrong.</p>
      </div>

      <div class="bg-white/5 rounded-2xl p-6 mb-8 border border-white/10">
        <p class="text-white/80 text-sm">
          Our team has been notified and is working to fix the issue.
        </p>
      </div>

      <div class="space-y-4">
        <a href="/" class="w-full inline-flex items-center justify-center px-6 py-3 rounded-2xl text-sm font-semibold bg-white text-brand-700 shadow-lg hover:bg-white/90 transition">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          Go to Dashboard
        </a>
        
        <button onclick="window.location.reload()" class="w-full inline-flex items-center justify-center px-6 py-3 rounded-2xl text-sm font-semibold border border-white/30 text-white/80 hover:bg-white/10 transition">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Try Again
        </button>
      </div>

      <p class="text-xs text-white/50 mt-6">
        If you are the application owner, check the logs for more information.
      </p>
    </div>
  </div>
</body>
</html>
